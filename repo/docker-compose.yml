services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: meridian_app
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:-}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-meridian}
      DB_USERNAME: ${DB_USERNAME:-meridian}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      SSO_ENABLED: ${SSO_ENABLED:-false}
      LDAP_HOST: ${LDAP_HOST:-}
      LDAP_PORT: ${LDAP_PORT:-389}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-}
      LDAP_USERNAME: ${LDAP_USERNAME:-}
      LDAP_PASSWORD: ${LDAP_PASSWORD:-}
      LDAP_USER_DN: ${LDAP_USER_DN:-}
      LDAP_USER_FILTER: ${LDAP_USER_FILTER:-(uid={username})}
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
    volumes:
      - app_public:/var/www/html/public
      - app_storage:/var/www/html/storage
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
      - backups:/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - meridian_network

  web:
    image: nginx:1.25-alpine
    container_name: meridian_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public:/var/www/html/public:ro
      - app_storage:/var/www/html/storage:ro
    depends_on:
      - app
    networks:
      - meridian_network

  db:
    image: mysql:8.0
    container_name: meridian_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-meridian}
      MYSQL_USER: ${DB_USERNAME:-meridian}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -prootsecret --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - meridian_network

volumes:
  db_data:
  app_public:
  app_storage:
  app_bootstrap_cache:
  backups:

networks:
  meridian_network:
    driver: bridge
